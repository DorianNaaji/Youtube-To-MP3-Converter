name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Target release tag (leave empty to use the latest release)'
        required: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Resolve target tag
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Publish single-file exe
        run: |
          dotnet publish YoutubeToMP3/YoutubeToMP3.csproj `
            -c Release `
            -o ./publish

      - name: Sign exe (self-signed — sets publisher name)
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=Dorian NAAJI" `
            -Type CodeSigning `
            -HashAlgorithm SHA256 `
            -CertStoreLocation "Cert:\CurrentUser\My"
          $pwd = ConvertTo-SecureString "ci_temp" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath signing.pfx -Password $pwd | Out-Null
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe `
            | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1).FullName
          & $signtool sign /f signing.pfx /p ci_temp /fd sha256 /td sha256 `
            /tr http://timestamp.digicert.com ./publish/YoutubeToMP3.exe
          Remove-Item signing.pfx

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: publish/YoutubeToMP3.exe
        env:
          GITHUB_TOKEN: ${{ github.token }}
