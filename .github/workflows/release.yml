name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Target release tag (leave empty to use the latest release)'
        required: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Resolve target tag
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Publish single-file exe
        run: |
          dotnet publish YoutubeToMP3/YoutubeToMP3.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -o ./publish

      # Code signing via SignPath.io (OSS free program)
      # To enable: apply at https://app.signpath.io → OSS Free
      # Then uncomment and fill in organization-id + project/policy slugs
      # Also add SIGNPATH_API_TOKEN to GitHub repo secrets
      #
      # - name: Sign exe
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: '<your-org-id>'
      #     project-slug: youtube-to-mp3
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: exe
      #     github-artifact-name: YoutubeToMP3
      #     wait-for-completion: true
      #     output-artifact-name: YoutubeToMP3-signed

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            publish/YoutubeToMP3.exe
            YoutubeToMP3/Resources/mp3.ico
        env:
          GITHUB_TOKEN: ${{ github.token }}
